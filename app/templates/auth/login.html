<!-- This page extends base.html — it inherits the navbar and everything -->
{% extends 'base.html' %}

{% block title %}Login — Smart Mess{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow-sm">
        <div class="card-body p-4">

          <h4 class="card-title text-center mb-4">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </h4>

          <!-- action="" means POST to the same URL /login -->
          <!-- method="POST" means the data is sent securely in the request body -->
          <form action="" method="POST">

            <!-- Role selector — determines which table we query -->
            <div class="mb-3">
              <label class="form-label">I am a</label>
              <select name="role" class="form-select" required>
                <option value="student">Student</option>
                <option value="admin">Mess Admin</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input type="email" name="email" class="form-control"
                     placeholder="you@example.com" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control"
                     placeholder="Your password" required>
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-dark btn-lg">
                Login
              </button>
            </div>

          </form>

          <div class="text-center mt-3">
            <small>Don't have an account?
              <a href="{{ url_for('auth.register') }}">Register here</a>
            </small>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
