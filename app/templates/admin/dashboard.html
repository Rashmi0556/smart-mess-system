{% extends 'base.html' %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="container mt-4">

  <h4 class="mb-4">🛡️ Welcome, {{ admin.name }}</h4>

  <!-- Stats row -->
  <div class="row g-3 mb-4">

    <div class="col-md-4">
      <div class="card border-0 shadow-sm text-center p-3">
        <div class="fs-1">👥</div>
        <div class="fs-3 fw-bold text-dark">{{ active_count }}</div>
        <div class="text-muted small">Active subscribers</div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card border-0 shadow-sm text-center p-3">
        <div class="fs-1">✅</div>
        <div class="fs-3 fw-bold text-dark">{{ today_count }}</div>
        <div class="text-muted small">Attendance marked today</div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card border-0 shadow-sm text-center p-3">
        <div class="fs-1">📅</div>
        <div class="fs-5 fw-bold text-dark">{{ today }}</div>
        <div class="text-muted small">Today's date</div>
      </div>
    </div>

  </div>

  <!-- Quick links -->
  <div class="row g-3">
    <div class="col-md-4">
      <a href="{{ url_for('admin.subscribers') }}" class="btn btn-outline-dark w-100 py-3">
        👥 View Subscribers
      </a>
    </div>
    <div class="col-md-4">
      <a href="{{ url_for('admin.menu_editor') }}" class="btn btn-outline-dark w-100 py-3">
        🍱 Edit Menu
      </a>
    </div>
    <div class="col-md-4">
      <a href="{{ url_for('admin.mark_attendance') }}" class="btn btn-outline-dark w-100 py-3">
        ✅ Mark Attendance
      </a>
    </div>
  </div>

</div>
{% endblock %}
